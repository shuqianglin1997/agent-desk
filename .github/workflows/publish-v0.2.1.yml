name: Publish v0.2.1

# One-shot bridge for the v0.2.1 artifacts that were built successfully while
# the release workflow still created drafts. Remove this workflow after it
# publishes the existing draft.
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-v0.2.1.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Publish the verified v0.2.1 draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit v0.2.1 --draft=false --latest --repo "$GITHUB_REPOSITORY"
