name: Build & Release

# Build macOS + Windows packages natively on each OS.
# Push a version tag (e.g. v0.2.1) to build and attach installers to a draft Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinned to macos-15 (Sequoia): macos-latest migrated to macOS 26
          # (Tahoe), where electron-builder's DMG step fails in hdiutil with
          # "no mountable file systems". macos-15 builds the universal dmg fine.
          - os: macos-15
            script: build:mac
          - os: windows-latest
            script: build:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$package_version" ]; then
            echo "::error::Tag v${tag_version} does not match package.json version ${package_version}."
            exit 1
          fi

      - name: Syntax check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        shell: bash
        run: |
          npm run ${{ matrix.script }} 2>&1 | tee build.log
          exit "${PIPESTATUS[0]}"

      - name: Surface build error
        if: failure()
        shell: bash
        run: |
          echo '----- build.log (tail) -----'
          tail -80 build.log || true
          # Emit the last log lines as GitHub error annotations, visible on the
          # public run summary without sign-in (so failures can be diagnosed).
          tail -10 build.log | while IFS= read -r line; do
            clean=$(printf '%s' "$line" | tr -d '\r' | cut -c1-400)
            [ -n "$clean" ] && printf '::error::%s\n' "$clean"
          done || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd artifacts
          find . -type f ! -name SHA256SUMS.txt -exec sha256sum {} \; \
            | sed -E 's#  \./[^/]+/#  #' \
            | LC_ALL=C sort > SHA256SUMS.txt

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            artifacts/*/*
            artifacts/SHA256SUMS.txt
